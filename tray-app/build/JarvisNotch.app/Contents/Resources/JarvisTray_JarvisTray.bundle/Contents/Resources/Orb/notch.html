<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Jarvis Notch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --accent: #ffb84d;
      --accent-dim: rgba(255, 184, 77, 0.55);
      --surface: rgba(14, 14, 16, 0.7);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f2f3f5;
      --muted: rgba(242, 243, 245, 0.55);
      --font-ui: 'Inter', -apple-system, system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', 'SF Mono', monospace;
    }
    html, body {
      /* color-scheme: dark — tells the browser that when the canvas is
         effectively "unset" (iframe embedding, transparent bg), the fallback
         is dark. Without this, Chromium/Safari paint a white iframe canvas
         behind the transparent page, which is exactly the "white Noce" bug
         on the dashboard mirror. */
      color-scheme: dark;
      background: transparent !important;
      overflow: hidden !important;
      height: 100vh; width: 100vw; margin: 0; padding: 0;
      font-family: var(--font-ui);
      color: var(--text);
    }
    /* Kill everything from upstream HUD */
    body::before,
    .space-background, .grid-overlay, .floating-particles,
    .system-status, .info-center, .terminal-panel, .spectrum-analyzer,
    .mobile-toolbar, .mobile-overlay, .loading-overlay,
    .interface-container .header, .audio-wave, .notification,
    .scanner-frame, .circular-visualizer {
      display: none !important;
    }

    /* ── Safe area — DynamicNotchKit rounds the top corners so the first
       ~20px on each side are inside the curve. We pad the content down and
       clip the Three.js canvas to a rounded rect so nothing bleeds into the
       rounded corners. ── */
    /* Fixed-size orb stage — critical for the DynamicNotchKit expand
       animation. If the stage size is percentage-based, WebKit resizes the
       canvas during the animation and three.js can't re-render fast enough,
       which stretches the sphere. Locking the stage to explicit pixels
       means the Three.js renderer lives at a constant resolution while the
       surrounding panel grows around it. */
    .stage {
      position: fixed;
      left: 50%;
      top: 18px;
      transform: translateX(-50%);
      width: 260px;
      height: 260px;
      pointer-events: none;
      z-index: 1;
      border-radius: 14px;
      overflow: hidden;
    }
    #three-container {
      position: absolute !important;
      inset: 0 !important;
      width: 260px !important;
      height: 260px !important;
      pointer-events: none;
    }
    /* Bottom half — content that swaps based on left/right icon click */
    .content {
      position: fixed;
      left: 0; right: 0;
      /* 18px (stage top) + 260px (stage height) + 12px breathing room */
      top: 290px;
      bottom: 10px;
      display: grid;
      grid-template-columns: 1fr;
      padding: 2px 14px 0;
      box-sizing: border-box;
    }

    /* Chat pane */
    .chat-pane {
      display: flex;
      flex-direction: column;
      min-height: 0;
      gap: 6px;
    }
    .chat-log {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 0 2px;
    }
    .chat-log::-webkit-scrollbar { width: 3px; }
    .chat-log::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.12);
      border-radius: 2px;
    }
    .chat-log:empty::after {
      content: "Scrivi qualcosa a Jarvis.";
      color: rgba(255,255,255,0.25);
      font-size: 11px;
      padding: 12px 4px;
      text-align: center;
    }
    .bubble {
      font-size: 12px;
      line-height: 1.45;
      padding: 6px 9px;
      border-radius: 8px;
      max-width: 88%;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .bubble.user {
      align-self: flex-end;
      background: rgba(255, 184, 77, 0.14);
      color: var(--text);
    }
    .bubble.assistant {
      align-self: flex-start;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
    }
    /* Tiny timestamp below each bubble — Fase 1 chat history rehydrate. */
    .chat-ts {
      font-size: 9px;
      color: rgba(255, 255, 255, 0.28);
      font-family: var(--font-mono);
      margin-top: -2px;
      padding: 0 4px;
    }
    .chat-ts.user { align-self: flex-end; }
    .chat-ts.assistant { align-self: flex-start; }
    .input-row {
      display: flex;
      align-items: center;
      gap: 4px;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 10px;
      padding: 3px 3px 3px 4px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    /* Toolbar — 3 toggles rendered as compact pills above the input row.
       Toggle label text is 9px so three fit within the 392px inner width
       without wrapping on 14" notch geometry. */
    .toolbar {
      display: flex;
      gap: 4px;
      margin-bottom: 4px;
    }
    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 7px;
      font-size: 9px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.03);
      border: 0.5px solid var(--border);
      border-radius: 999px;
      cursor: pointer;
      user-select: none;
      transition: color 0.15s, background 0.15s, border-color 0.15s;
    }
    .toggle input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 18px;
      height: 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      position: relative;
      cursor: pointer;
      margin: 0;
      transition: background 0.15s;
    }
    .toggle input[type="checkbox"]::after {
      content: "";
      position: absolute;
      top: 1px;
      left: 1px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.7);
      transition: transform 0.15s, background 0.15s;
    }
    .toggle input[type="checkbox"]:checked {
      background: rgba(255, 184, 77, 0.65);
    }
    .toggle input[type="checkbox"]:checked::after {
      transform: translateX(8px);
      background: #fff;
    }
    .toggle:has(input:checked) {
      color: var(--accent);
      border-color: rgba(255, 184, 77, 0.3);
    }
    .mic {
      background: transparent;
      border: none;
      color: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      padding: 5px 6px;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, background 0.15s;
    }
    .mic:hover { background: rgba(255, 255, 255, 0.05); color: var(--text); }
    .mic.recording {
      color: #ff6b6b;
      background: rgba(255, 107, 107, 0.14);
      animation: mic-pulse 1.1s ease-in-out infinite;
    }
    @keyframes mic-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255, 107, 107, 0.55); }
      50%      { box-shadow: 0 0 0 6px rgba(255, 107, 107, 0); }
    }
    .input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 12px;
      padding: 6px 0;
    }
    .input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }
    .send {
      background: transparent;
      border: none;
      color: var(--accent);
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .send:hover:not(:disabled) { background: rgba(255, 184, 77, 0.12); }
    .send:disabled { color: rgba(255, 255, 255, 0.2); cursor: default; }
    .send svg { display: block; }

    /* Activity pane (shown when right icon clicked) */
    .activity-pane {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
    }
    .activity-pane h4 {
      margin: 0;
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
    }
    .channel-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      overflow-y: auto;
      min-height: 0;
    }
    .channel-row {
      display: grid;
      grid-template-columns: 54px 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 7px 10px;
      background: rgba(255, 255, 255, 0.025);
      border-radius: 8px;
    }
    .channel-row .name {
      font-size: 11px;
      font-weight: 500;
      color: var(--text);
    }
    .channel-row .bar {
      position: relative;
      height: 4px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 2px;
      overflow: hidden;
    }
    .channel-row .bar > span {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      background: linear-gradient(90deg, var(--accent-dim), var(--accent));
      border-radius: 2px;
      transition: width 0.35s ease-out;
    }
    .channel-row .count {
      font-family: var(--font-mono);
      font-size: 10.5px;
      color: var(--muted);
      min-width: 2ch;
      text-align: right;
    }
    .channel-row .count.active { color: var(--accent); }

    /* Mode switching — CSS only, driven by html[data-notch-focus] */
    .chat-pane   { display: flex; }
    .activity-pane { display: none; }
    html[data-notch-focus="activity"] .chat-pane { display: none; }
    html[data-notch-focus="activity"] .activity-pane { display: flex; }
  </style>
  <script type="module" crossorigin src="./assets/notch-BpndmdBM.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/three.module-BKy29xO0.js">
  <link rel="stylesheet" crossorigin href="./assets/three-CnkMWE36.css">
</head>
<body>
  <div class="stage">
    <div id="three-container"></div>
  </div>
  <div class="content">
    <!-- Chat pane (default) -->
    <div class="chat-pane">
      <div class="chat-log" id="notch-log"></div>
      <div class="toolbar" id="notch-toolbar">
        <label class="toggle" title="Risposte parlate con TTS on-device">
          <input type="checkbox" data-pref="tts" />
          <span>Voce</span>
        </label>
        <label class="toggle" title="Registra automaticamente al passaggio del mouse — sperimentale">
          <input type="checkbox" data-pref="hoverRecord" />
          <span>Hover</span>
        </label>
        <label class="toggle" title="Silenzia tutto l'audio del notch">
          <input type="checkbox" data-pref="mute" />
          <span>Muto</span>
        </label>
      </div>
      <div class="input-row">
        <button class="mic" id="notch-mic" aria-label="Voice input">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
            <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
            <line x1="12" y1="19" x2="12" y2="23" />
            <line x1="8" y1="23" x2="16" y2="23" />
          </svg>
        </button>
        <input type="text" class="input" id="notch-input" placeholder="Chiedi a Jarvis…" autocomplete="off" />
        <button class="send" id="notch-send" disabled aria-label="Invia">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 2L11 13" />
            <path d="M22 2L15 22L11 13L2 9L22 2Z" />
          </svg>
        </button>
      </div>
    </div>

    <!-- Activity pane (shown when the right icon is clicked) -->
    <div class="activity-pane">
      <h4>Canali</h4>
      <div class="channel-list" id="channel-list">
        <div class="channel-row" data-channel="telegram">
          <span class="name">Telegram</span>
          <div class="bar"><span id="bar-telegram" style="width:0%"></span></div>
          <span class="count" id="count-telegram">0</span>
        </div>
        <div class="channel-row" data-channel="whatsapp">
          <span class="name">WhatsApp</span>
          <div class="bar"><span id="bar-whatsapp" style="width:0%"></span></div>
          <span class="count" id="count-whatsapp">0</span>
        </div>
        <div class="channel-row" data-channel="discord">
          <span class="name">Discord</span>
          <div class="bar"><span id="bar-discord" style="width:0%"></span></div>
          <span class="count" id="count-discord">0</span>
        </div>
        <div class="channel-row" data-channel="notch">
          <span class="name">Noce</span>
          <div class="bar"><span id="bar-notch" style="width:0%"></span></div>
          <span class="count" id="count-notch">0</span>
        </div>
      </div>
    </div>
  </div>

  <script src="./vendor/gsap/gsap.min.js"></script>
  <script>
    // Channel activity — decays toward 0 over ~2s since last event.
    (function() {
      var levels = { telegram: 0, whatsapp: 0, discord: 0, notch: 0 };
      var counts = { telegram: 0, whatsapp: 0, discord: 0, notch: 0 };

      function render() {
        Object.keys(levels).forEach(function(k) {
          var bar = document.getElementById('bar-' + k);
          var count = document.getElementById('count-' + k);
          if (bar) bar.style.width = (Math.round(levels[k] * 100)) + '%';
          if (count) {
            count.textContent = counts[k];
            count.classList.toggle('active', levels[k] > 0.05);
          }
        });
      }

      function bump(channel) {
        if (!(channel in levels)) return;
        levels[channel] = Math.min(1, levels[channel] + 0.75);
        counts[channel] += 1;
        render();
      }

      setInterval(function() {
        var changed = false;
        Object.keys(levels).forEach(function(k) {
          if (levels[k] > 0) {
            levels[k] = Math.max(0, levels[k] - 0.04);
            changed = true;
          }
        });
        if (changed) render();
      }, 66);

      // Exposed so the SSE handler can notify us.
      window.__notchBump = bump;
      render();
    })();
  </script>
  <script>
    // Fase 1 — chat history persistente.
    // The bundled notch-*.js already exposes `window.__notchPush(role, text)`
    // and consumes `message.in` + `voice.transcribed` from the SSE stream.
    // This inline layer only adds: (a) rehydrate from GET /api/notch/history,
    // (b) subscribe once more for `message.out` (the user's own echo, which
    // the bundle does not handle), and (c) drop a small HH:mm timestamp under
    // each new bubble so the log looks like a real chat thread.
    (function() {
      var log = document.getElementById('notch-log');
      if (!log) return;
      var host = window.__notchHost || window.location.origin;
      var base = host.replace(/\/+$/, '');

      function fmtTime(ts) {
        try {
          var d = new Date(ts);
          var hh = String(d.getHours()).padStart(2, '0');
          var mm = String(d.getMinutes()).padStart(2, '0');
          return hh + ':' + mm;
        } catch (e) { return ''; }
      }

      // Pin a timestamp to the bubble that __notchPush just appended. We
      // walk from the tail because the bundle trims old bubbles with
      // removeChild(firstChild), so the newest bubble is always the last
      // .bubble that does NOT already have a sibling .chat-ts.
      function tagLastBubbleWithTs(role, ts) {
        var kids = log.children;
        for (var i = kids.length - 1; i >= 0; i--) {
          var el = kids[i];
          if (el.classList && el.classList.contains('bubble')) {
            var next = el.nextElementSibling;
            if (next && next.classList && next.classList.contains('chat-ts')) continue;
            var span = document.createElement('div');
            span.className = 'chat-ts ' + role;
            span.textContent = fmtTime(ts);
            el.insertAdjacentElement('afterend', span);
            log.scrollTop = log.scrollHeight;
            return;
          }
        }
      }

      function addMsg(role, text, ts) {
        // role here is the DOM role: "user" or "assistant".
        if (typeof window.__notchPush === 'function') {
          window.__notchPush(role, text);
        } else {
          // Fallback: the bundle hasn't booted yet. Render ourselves.
          var b = document.createElement('div');
          b.className = 'bubble ' + role;
          b.textContent = text;
          log.appendChild(b);
        }
        tagLastBubbleWithTs(role, ts || Date.now());
      }

      // (a) Rehydrate — wipe whatever the bundle may have restored from its
      // in-memory ring buffer, then pour the JSONL tail back in.
      function rehydrate() {
        fetch(base + '/api/notch/history?limit=60', { credentials: 'same-origin' })
          .then(function(r) { return r.ok ? r.json() : { items: [] }; })
          .then(function(data) {
            var items = (data && data.items) || [];
            if (!items.length) return;
            if (typeof window.__notchClearLog === 'function') window.__notchClearLog();
            items.forEach(function(rec) {
              var role = rec.role === 'agent' ? 'assistant' : 'user';
              addMsg(role, rec.text, rec.ts);
            });
          })
          .catch(function() { /* advisory */ });
      }

      // (b) Listen for message.out (user echo). The bundle's EventSource
      // handles message.in + voice.transcribed already; we only need to add
      // the one event it doesn't know about. We also intercept message.in /
      // voice.transcribed here just to attach timestamps to the bubbles the
      // bundle already appended.
      var es = null;
      function openSSE() {
        try {
          es = new EventSource(base + '/api/notch/stream');
        } catch (e) { return; }
        es.onmessage = function(ev) {
          var event;
          try { event = JSON.parse(ev.data); } catch (e) { return; }
          if (!event || !event.type) return;
          if (event.type === 'message.out') {
            var text = event.data && event.data.text;
            if (text) addMsg('user', text, Date.now());
          } else if (event.type === 'message.in' || event.type === 'voice.transcribed') {
            // The bundle appended the bubble; we just stamp it.
            var role = event.type === 'message.in' ? 'assistant' : 'user';
            // defer one tick so the bundle wins the append race.
            setTimeout(function() { tagLastBubbleWithTs(role, Date.now()); }, 0);
          }
        };
        es.onerror = function() {
          try { es.close(); } catch (e) {}
          setTimeout(openSSE, 1500);
        };
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function() { rehydrate(); openSSE(); });
      } else {
        rehydrate();
        openSSE();
      }
    })();
  </script>
  <script>
    // Wave 2 — toolbar prefs + TTS audio playback.
    // Hooks three toggles (tts, hoverRecord, mute) to GET/POST /api/notch/prefs
    // so both surfaces stay in sync, and subscribes to `audio.play` SSE events
    // to auto-play TTS output. hoverRecord additionally notifies the native
    // tray app via messageHandlers.jarvis so the Swift side can arm/disarm
    // the StreamingRecorder — the dashboard mirror has no local mic, so the
    // pref is informational there.
    (function() {
      var host = window.__notchHost || window.location.origin;
      var base = host.replace(/\/+$/, '');
      var toolbar = document.getElementById('notch-toolbar');
      if (!toolbar) return;
      var inputs = toolbar.querySelectorAll('input[type="checkbox"][data-pref]');

      function applyState(prefs) {
        inputs.forEach(function(el) {
          var k = el.getAttribute('data-pref');
          if (k in prefs) el.checked = !!prefs[k];
        });
      }

      function loadPrefs() {
        fetch(base + '/api/notch/prefs', { credentials: 'same-origin' })
          .then(function(r) { return r.ok ? r.json() : null; })
          .then(function(prefs) { if (prefs) applyState(prefs); })
          .catch(function() { /* stay on defaults */ });
      }

      function postPatch(patch) {
        fetch(base + '/api/notch/prefs', {
          method: 'POST',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(patch)
        }).catch(function() { /* advisory */ });
      }

      function bridgeToNative(type, body) {
        try {
          if (window.webkit && window.webkit.messageHandlers &&
              window.webkit.messageHandlers.jarvis) {
            var msg = Object.assign({ type: type }, body || {});
            window.webkit.messageHandlers.jarvis.postMessage(msg);
          }
        } catch (e) { /* dashboard iframe has no bridge, ignore */ }
      }

      inputs.forEach(function(el) {
        el.addEventListener('change', function() {
          var k = el.getAttribute('data-pref');
          var patch = {};
          patch[k] = el.checked;
          postPatch(patch);
          if (k === 'hoverRecord') bridgeToNative('setHoverRecord', { on: el.checked });
        });
      });

      // TTS playback — one <audio> element reused across messages so rapid
      // replies queue naturally (new .src interrupts the previous one, which
      // matches the user's mental model: "Jarvis is saying the latest thing").
      var audioEl = null;
      function ensureAudio() {
        if (audioEl) return audioEl;
        audioEl = document.createElement('audio');
        audioEl.style.display = 'none';
        audioEl.preload = 'auto';
        document.body.appendChild(audioEl);
        return audioEl;
      }
      function playAudio(url) {
        var el = ensureAudio();
        try { el.pause(); } catch (e) {}
        el.src = base + url + '?t=' + Date.now();
        var p = el.play();
        if (p && typeof p.catch === 'function') p.catch(function() { /* autoplay denied */ });
      }

      var es = null;
      function openAudioSSE() {
        try { es = new EventSource(base + '/api/notch/stream'); }
        catch (e) { return; }
        es.onmessage = function(ev) {
          var event;
          try { event = JSON.parse(ev.data); } catch (e) { return; }
          if (event && event.type === 'audio.play' && event.data && event.data.url) {
            playAudio(event.data.url);
          }
        };
        es.onerror = function() {
          try { es.close(); } catch (e) {}
          setTimeout(openAudioSSE, 1500);
        };
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function() { loadPrefs(); openAudioSSE(); });
      } else {
        loadPrefs();
        openAudioSSE();
      }
    })();
  </script>
</body>
</html>
