<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Jarvis Notch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --accent: #ffb84d;
      --accent-dim: rgba(255, 184, 77, 0.55);
      --surface: rgba(14, 14, 16, 0.7);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f2f3f5;
      --muted: rgba(242, 243, 245, 0.55);
      --font-ui: 'Inter', -apple-system, system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', 'SF Mono', monospace;
    }
    html, body {
      /* color-scheme: dark — tells the browser that when the canvas is
         effectively "unset" (iframe embedding, transparent bg), the fallback
         is dark. Without this, Chromium/Safari paint a white iframe canvas
         behind the transparent page, which is exactly the "white Noce" bug
         on the dashboard mirror. */
      color-scheme: dark;
      background: transparent !important;
      /* `overflow: visible` so the input-row's voice-mode aura can spill
         OUTSIDE the visible notch panel (DynamicNotchPanel is rendered as
         a large transparent overlay; only the NotchShape mask is visible).
         html stays clipped to viewport so accidental layout overflow can't
         scroll the page. */
      overflow: visible !important;
      height: 100vh; width: 100vw; margin: 0; padding: 0;
      font-family: var(--font-ui);
      color: var(--text);
    }
    html { overflow: hidden !important; }
    /* Kill everything from upstream HUD */
    body::before,
    .space-background, .grid-overlay, .floating-particles,
    .system-status, .info-center, .terminal-panel, .spectrum-analyzer,
    .mobile-toolbar, .mobile-overlay, .loading-overlay,
    .interface-container .header, .audio-wave, .notification,
    .scanner-frame, .circular-visualizer {
      display: none !important;
    }

    /* ── Safe area — DynamicNotchKit rounds the top corners so the first
       ~20px on each side are inside the curve. We pad the content down and
       clip the Three.js canvas to a rounded rect so nothing bleeds into the
       rounded corners. ── */
    /* Fixed-size orb stage — critical for the DynamicNotchKit expand
       animation. If the stage size is percentage-based, WebKit resizes the
       canvas during the animation and three.js can't re-render fast enough,
       which stretches the sphere. Locking the stage to explicit pixels
       means the Three.js renderer lives at a constant resolution while the
       surrounding panel grows around it. */
    /* Orb is the background layer; chat overlays at z-index 1. */
    .stage {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 320px;
      height: 320px;
      pointer-events: none;
      z-index: 0;
      border-radius: 16px;
      overflow: hidden;
      mask-image: radial-gradient(ellipse at center, #000 55%, transparent 95%);
      -webkit-mask-image: radial-gradient(ellipse at center, #000 55%, transparent 95%);
    }
    #three-container {
      position: absolute !important;
      inset: 0 !important;
      width: 320px !important;
      height: 320px !important;
      pointer-events: none;
    }
    .content {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr;
      /* Top padding leaves a small gap below the system-notch cutout so the
         topmost chat bubble / live transcript never appears clipped under
         the curve. DynamicNotchKit already insets the panel by notchHeight
         around the WebView; this is the inner breathing room. */
      padding: 18px 14px 12px;
      box-sizing: border-box;
    }

    /* Chat pane */
    .chat-pane {
      display: flex;
      flex-direction: column;
      min-height: 0;
      gap: 6px;
    }
    .chat-log {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 0 2px;
    }
    .chat-log::-webkit-scrollbar { width: 3px; }
    .chat-log::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.12);
      border-radius: 2px;
    }
    .chat-log:empty::after {
      content: "Scrivi qualcosa a Jarvis.";
      color: rgba(255,255,255,0.25);
      font-size: 11px;
      padding: 12px 4px;
      text-align: center;
    }
    .bubble {
      font-size: 12px;
      line-height: 1.45;
      padding: 6px 9px;
      border-radius: 8px;
      max-width: 88%;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .bubble.user {
      align-self: flex-end;
      background: rgba(40, 24, 8, 0.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      box-shadow: inset 0 0 0 0.5px rgba(255, 184, 77, 0.25);
      color: var(--text);
    }
    .bubble.assistant {
      align-self: flex-start;
      background: rgba(14, 14, 16, 0.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      box-shadow: inset 0 0 0 0.5px rgba(255, 255, 255, 0.10);
      color: var(--text);
    }
    /* Per-bubble timestamps were noisy and clashed with the peek pattern
       outside the notch — hidden by default. The tagger logic still runs
       so we can resurface them later behind a preference if needed. */
    .chat-ts { display: none; }

    /* Pending assistant bubble — typing-dots while waiting for first chunk.
       Looks IDENTICAL to a normal `.bubble.assistant` (same bg, same border,
       same color) so the loading state reads as "the response message is
       being typed", not as a separate widget with its own design. The dots
       become the streamed text in place once the first chunk lands. */
    .bubble.pending {
      display: flex;
      align-self: flex-start;
      align-items: center;
      gap: 5px;
      width: fit-content;
      min-width: 38px;
      min-height: 22px;
      padding: 6px 9px;
      background: rgba(14, 14, 16, 0.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      box-shadow: inset 0 0 0 0.5px rgba(255, 255, 255, 0.10);
      color: var(--text);
    }
    .bubble.pending .typing-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      animation: notch-typing 1.1s infinite ease-in-out both;
    }
    .bubble.pending .typing-dot:nth-child(2) { animation-delay: 0.18s; }
    .bubble.pending .typing-dot:nth-child(3) { animation-delay: 0.36s; }
    @keyframes notch-typing {
      0%, 80%, 100% { opacity: 0.30; transform: translateY(0); }
      40% { opacity: 1; transform: translateY(-3px); }
    }
    /* Live timer chip — sits INSIDE the assistant bubble while the LLM
       is thinking/streaming, ticks 10× per second. After the final lands
       it migrates into the timing-strip below the bubble as the static
       `llm` value. A second chip with role=audio appears during TTS. */
    .live-timer {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      margin-left: auto;
      padding: 1px 6px;
      font-family: var(--font-mono);
      font-size: 9.5px;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
      color: rgba(255, 184, 77, 0.75);
      background: rgba(255, 184, 77, 0.08);
      border-radius: 999px;
      flex-shrink: 0;
      align-self: center;
    }
    .live-timer.audio { color: rgba(120, 230, 180, 0.85); background: rgba(120, 230, 180, 0.10); }
    .live-timer.frozen::before { animation: none; opacity: 0.45; }
    .live-timer::before {
      content: '';
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: currentColor;
      animation: live-pulse 1.0s ease-in-out infinite;
    }
    @keyframes live-pulse {
      0%, 100% { opacity: 0.35; transform: scale(0.85); }
      50%      { opacity: 1;    transform: scale(1.1);  }
    }
    /* Bubble flex layout so the live-timer chip can sit at the end of
       the same line as the streaming text (or beside the typing dots). */
    .bubble.pending, .bubble.streaming {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 6px;
    }
    .bubble.streaming .pending-text {
      flex: 1 1 auto;
      min-width: 0;
    }

    /* Streaming bubble — soft accent-tinted left border to signal "still generating". */
    .bubble.streaming {
      box-shadow: inset 2px 0 0 var(--accent-dim);
    }

    /* Phase-timing strips — small monospace row below user/assistant bubbles
       summarizing how long each phase took (typing, LLM, tokens, model, audio).
       Replaces the in-bubble `[t .. | llm .. | tok ..]` footer that the agent
       normally appends in Telegram/WhatsApp; cleaner and out of the reading
       flow. Two flavors with the same shape. */
    .timing-strip {
      font-family: var(--font-mono);
      font-size: 9px;
      color: rgba(242, 243, 245, 0.45);
      padding: 0 4px;
      margin-top: -3px;
      letter-spacing: 0.02em;
      display: flex;
      flex-wrap: wrap;
      gap: 0 8px;
    }
    .timing-strip.user { align-self: flex-end; }
    .timing-strip.assistant { align-self: flex-start; }
    .timing-strip .seg-label { color: rgba(242, 243, 245, 0.30); margin-right: 2px; }
    .timing-strip .seg-val { color: rgba(255, 184, 77, 0.85); }
    .timing-strip .seg-model {
      color: var(--accent);
      text-transform: lowercase;
    }

    /* Live transcript bubble — Apple SFSpeechRecognizer partials stream into
       this while hover-record is active. Italic + subtle blink cursor signals
       "still hearing you". Replaced with a normal user bubble on final. */
    .bubble.user.live-transcript {
      font-style: italic;
      color: rgba(242, 243, 245, 0.85);
      background: rgba(255, 184, 77, 0.06);
      box-shadow: inset 0 0 0 0.5px rgba(255, 184, 77, 0.45);
    }
    .bubble.user.live-transcript::after {
      content: "▍";
      display: inline-block;
      margin-left: 2px;
      color: var(--accent);
      animation: notch-cursor-blink 1s steps(2) infinite;
    }
    @keyframes notch-cursor-blink {
      0%, 50% { opacity: 1; }
      50.01%, 100% { opacity: 0; }
    }

    /* Voice mode aura: cyan when mic is open + listening (no voice
       detected yet), green pulse when actively talking. Lets the user
       see at-a-glance whether Jarvis is hearing them. */
    body.voice-listening::before, body.voice-voiced::before {
      content: '';
      position: fixed;
      inset: 4px;
      border-radius: 18px;
      pointer-events: none;
      z-index: 1;
      transition: box-shadow 0.18s ease-out;
    }
    body.voice-listening::before {
      box-shadow:
        inset 0 0 0 1px rgba(80, 200, 255, 0.55),
        inset 0 0 18px -2px rgba(80, 200, 255, 0.30);
    }
    body.voice-voiced::before {
      box-shadow:
        inset 0 0 0 2px rgba(80, 240, 160, 0.85),
        inset 0 0 26px -2px rgba(80, 240, 160, 0.55);
      animation: voice-voiced-pulse 1.2s ease-in-out infinite;
    }
    @keyframes voice-voiced-pulse {
      0%, 100% { filter: brightness(1); }
      50%      { filter: brightness(1.35); }
    }

    /* Hover-record grace aura — full-panel ring that fades out across the
       grace window. */
    .grace-aura {
      position: fixed;
      inset: 4px;
      border-radius: 18px;
      pointer-events: none;
      z-index: 2;
      box-shadow:
        inset 0 0 0 1px rgba(255, 184, 77, 0.65),
        inset 0 0 22px -2px rgba(255, 184, 77, 0.35);
      animation: notch-grace-fade var(--grace-ms, 2500ms) linear forwards;
    }
    @keyframes notch-grace-fade {
      0%   { opacity: 0.95; }
      100% { opacity: 0;    }
    }

    /* Abort warn overlay — flashes red around the panel when the cursor is
       within 200px of any screen corner while the recorder is running.
       Tells the user "keep going to cancel". Brighter / immediate compared
       to the orange grace aura. */
    .abort-warn {
      position: fixed;
      inset: 4px;
      border-radius: 18px;
      pointer-events: none;
      z-index: 3;
      box-shadow:
        inset 0 0 0 1.5px rgba(255, 84, 84, 0.85),
        inset 0 0 28px -2px rgba(255, 84, 84, 0.45);
      animation: notch-abort-pulse 0.9s ease-in-out infinite;
    }
    .abort-warn::after {
      content: "annulla ↘";
      position: absolute;
      bottom: 8px; right: 12px;
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255, 120, 120, 0.95);
    }
    @keyframes notch-abort-pulse {
      0%, 100% { opacity: 0.6; }
      50%      { opacity: 1.0; }
    }

    /* Voice mode badge — shown above the input row while the mic is hot.
       Includes a 5-bar live VU bound to __notchPartialLevel. */
    .voice-mode-badge {
      align-self: flex-start;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      padding: 4px 8px;
      border: 0.5px solid rgba(255, 184, 77, 0.35);
      border-radius: 999px;
      background: rgba(255, 184, 77, 0.06);
      width: fit-content;
    }
    .voice-mode-badge .vu {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 10px;
    }
    .voice-mode-badge .vu i {
      display: inline-block;
      width: 2px;
      background: var(--accent);
      border-radius: 1px;
      transform-origin: bottom center;
      transition: transform 80ms linear;
    }

    /* Audio playback indicator — small standalone row inserted JUST ABOVE
       the assistant bubble while TTS is streaming. Three little bars that
       jiggle on a quasi-VU rhythm. Removed when tts.stop fires. */
    .audio-indicator {
      align-self: flex-start;
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 14px;
      padding: 0 4px 0 2px;
    }
    .audio-indicator .audio-bar {
      width: 2.5px;
      background: var(--accent);
      border-radius: 1.5px;
      animation: notch-vu 0.9s infinite ease-in-out;
      transform-origin: bottom center;
    }
    .audio-indicator .audio-bar:nth-child(1) { animation-delay: 0s;    height: 6px; }
    .audio-indicator .audio-bar:nth-child(2) { animation-delay: 0.12s; height: 10px; }
    .audio-indicator .audio-bar:nth-child(3) { animation-delay: 0.24s; height: 8px; }
    .audio-indicator .audio-label {
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent-dim);
      margin-left: 4px;
    }
    @keyframes notch-vu {
      0%, 100% { transform: scaleY(0.4); }
      50%      { transform: scaleY(1.0); }
    }
    .input-row {
      display: flex;
      align-items: center;
      gap: 4px;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 10px;
      padding: 3px 3px 3px 4px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      position: relative;
      isolation: isolate;
      transition: box-shadow 120ms ease-out, border-color 120ms ease-out;
    }
    /* Voice-mode aura — a soft pulsing ring AROUND the input. Only painted
       while the mic is open (`body.voice-listening|voiced`); at rest the
       input has its plain border. The ring colour matches the orb accent
       (warm) and shifts to green when the VAD confirms voice. Budget is
       ~12-14px before body{overflow:hidden} clips, so the blur is kept
       within that range. */
    body.voice-listening .input-row,
    body.voice-voiced .input-row {
      border-color: rgba(255, 184, 77, 0.55);
      box-shadow:
        0 0 0 1.5px rgba(255, 184, 77, calc(0.45 + var(--voice-level, 0) * 0.4)),
        0 0 calc(28px + var(--voice-level, 0) * 36px) calc(8px + var(--voice-level, 0) * 14px) rgba(255, 184, 77, calc(0.32 + var(--voice-level, 0) * 0.45));
    }
    body.voice-voiced .input-row {
      border-color: rgba(110, 230, 160, 0.65);
      box-shadow:
        0 0 0 1.5px rgba(110, 230, 160, calc(0.55 + var(--voice-level, 0) * 0.4)),
        0 0 calc(28px + var(--voice-level, 0) * 36px) calc(8px + var(--voice-level, 0) * 14px) rgba(110, 230, 160, calc(0.38 + var(--voice-level, 0) * 0.45));
    }
    body.voice-voiced .input-row {
      --aura-color: 80, 240, 160;
    }

    /* Toolbar — 3 toggles rendered as compact pills above the input row.
       Toggle label text is 9px so three fit within the 392px inner width
       without wrapping on 14" notch geometry. */
    .toolbar {
      display: flex;
      gap: 4px;
      margin-bottom: 4px;
    }
    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 7px;
      font-size: 9px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.03);
      border: 0.5px solid var(--border);
      border-radius: 999px;
      cursor: pointer;
      user-select: none;
      transition: color 0.15s, background 0.15s, border-color 0.15s;
    }
    .toggle input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 18px;
      height: 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      position: relative;
      cursor: pointer;
      margin: 0;
      transition: background 0.15s;
    }
    .toggle input[type="checkbox"]::after {
      content: "";
      position: absolute;
      top: 1px;
      left: 1px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.7);
      transition: transform 0.15s, background 0.15s;
    }
    .toggle input[type="checkbox"]:checked {
      background: rgba(255, 184, 77, 0.65);
    }
    .toggle input[type="checkbox"]:checked::after {
      transform: translateX(8px);
      background: #fff;
    }
    /* Model-cycle button — same pill shape as toggles but with the current
       model id displayed inside. Clicks cycle opus → sonnet → haiku → opus. */
    .toggle.model-cycle {
      font-size: 9px;
      padding: 3px 8px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
    }
    .toggle.model-cycle:hover {
      color: var(--text);
      border-color: var(--accent-dim);
    }
    .toggle.model-cycle #model-label {
      color: var(--accent);
      font-weight: 600;
    }
    .toggle:has(input:checked) {
      color: var(--accent);
      border-color: rgba(255, 184, 77, 0.3);
    }
    .mic {
      background: transparent;
      border: none;
      color: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      padding: 5px 6px;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, background 0.15s;
    }
    .mic:hover { background: rgba(255, 255, 255, 0.05); color: var(--text); }
    /* Active call — uniform with the rest of the UI: warm accent (same as
       the orb / send button highlights), no aggressive red pulse. The
       aura around the input already provides the "I'm listening" cue, so
       the button just changes tint. */
    .mic.recording {
      color: var(--accent);
      background: rgba(255, 184, 77, 0.16);
    }
    body.voice-voiced .mic.recording {
      color: rgb(140, 240, 180);
      background: rgba(110, 230, 160, 0.16);
    }
    .input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 12px;
      padding: 6px 0;
    }
    .input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }
    .send {
      background: transparent;
      border: none;
      color: var(--accent);
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .send:hover:not(:disabled) { background: rgba(255, 184, 77, 0.12); }
    .send:disabled { color: rgba(255, 255, 255, 0.2); cursor: default; }
    .send svg { display: block; }

    /* Activity pane (shown when right icon clicked) */
    .activity-pane {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
    }
    .activity-pane h4 {
      margin: 0;
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
    }
    .channel-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      overflow-y: auto;
      min-height: 0;
    }
    .channel-row {
      display: grid;
      grid-template-columns: 54px 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 7px 10px;
      background: rgba(255, 255, 255, 0.025);
      border-radius: 8px;
    }
    .channel-row .name {
      font-size: 11px;
      font-weight: 500;
      color: var(--text);
    }
    .channel-row .bar {
      position: relative;
      height: 4px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 2px;
      overflow: hidden;
    }
    .channel-row .bar > span {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      background: linear-gradient(90deg, var(--accent-dim), var(--accent));
      border-radius: 2px;
      transition: width 0.35s ease-out;
    }
    .channel-row .count {
      font-family: var(--font-mono);
      font-size: 10.5px;
      color: var(--muted);
      min-width: 2ch;
      text-align: right;
    }
    .channel-row .count.active { color: var(--accent); }

    /* Mode switching — CSS only, driven by html[data-notch-focus] */
    .chat-pane   { display: flex; }
    .activity-pane { display: none; }
    html[data-notch-focus="activity"] .chat-pane { display: none; }
    html[data-notch-focus="activity"] .activity-pane { display: flex; }
  </style>
  <script type="module" crossorigin src="./assets/notch-BpndmdBM.js"></script>

<body>
  <div class="stage">
    <div id="three-container"></div>
  </div>
  <div class="content">
    <!-- Chat pane (default) -->
    <div class="chat-pane">
      <div class="chat-log" id="notch-log"></div>
      <div class="toolbar" id="notch-toolbar">
        <label class="toggle" title="Risposte parlate con TTS on-device">
          <input type="checkbox" data-pref="tts" />
          <span>Voce</span>
        </label>

  <script>
    // Channel activity — decays toward 0 over ~2s since last event.
    (function() {
      var levels = { telegram: 0, whatsapp: 0, discord: 0, notch: 0 };
      var counts = { telegram: 0, whatsapp: 0, discord: 0, notch: 0 };

      function render() {
        Object.keys(levels).forEach(function(k) {
          var bar = document.getElementById('bar-' + k);
          var count = document.getElementById('count-' + k);
          if (bar) bar.style.width = (Math.round(levels[k] * 100)) + '%';
          if (count) {
            count.textContent = counts[k];
            count.classList.toggle('active', levels[k] > 0.05);
          }
        });
      }

      function bump(channel) {
        if (!(channel in levels)) return;
        levels[channel] = Math.min(1, levels[channel] + 0.75);
        counts[channel] += 1;
        render();
      }

      setInterval(function() {
        var changed = false;
        Object.keys(levels).forEach(function(k) {
          if (levels[k] > 0) {
            levels[k] = Math.max(0, levels[k] - 0.04);
            changed = true;
          }
        });
        if (changed) render();
      }, 66);

      // Exposed so the SSE handler can notify us.
      window.__notchBump = bump;
      render();
    })();
  </script>
  <script>
    // Fase 1 — chat history persistente.
    // The bundled notch-*.js already exposes `window.__notchPush(role, text)`
    // and consumes `message.in` + `voice.transcribed` from the SSE stream.
    // This inline layer only adds: (a) rehydrate from GET /api/notch/history,
    // (b) subscribe once more for `message.out` (the user's own echo, which
    // the bundle does not handle), and (c) drop a small HH:mm timestamp under
    // each new bubble so the log looks like a real chat thread.
    (function() {
      var log = document.getElementById('notch-log');
      if (!log) return;
      var host = window.__notchHost || window.location.origin;
      var base = host.replace(/\/+$/, '');

      function fmtTime(ts) {
        try {
          var d = new Date(ts);
          var hh = String(d.getHours()).padStart(2, '0');
          var mm = String(d.getMinutes()).padStart(2, '0');
          return hh + ':' + mm;
        } catch (e) { return ''; }
      }

      // Pin a timestamp to the bubble that __notchPush just appended. We
      // walk from the tail because the bundle trims old bubbles with
      // removeChild(firstChild), so the newest bubble is always the last
      // .bubble that does NOT already have a sibling .chat-ts.
      function tagLastBubbleWithTs(role, ts) {
        var kids = log.children;
        for (var i = kids.length - 1; i >= 0; i--) {
          var el = kids[i];
          if (el.classList && el.classList.contains('bubble')) {
            var next = el.nextElementSibling;
            if (next && next.classList && next.classList.contains('chat-ts')) continue;
            var span = document.createElement('div');
            span.className = 'chat-ts ' + role;
            span.textContent = fmtTime(ts);
            el.insertAdjacentElement('afterend', span);
            log.scrollTop = log.scrollHeight;
            return;
          }
        }
      }

      function addMsg(role, text, ts) {
        // role here is the DOM role: "user" or "assistant".
        if (typeof window.__notchPush === 'function') {
          window.__notchPush(role, text);
        } else {
          // Fallback: the bundle hasn't booted yet. Render ourselves.
          var b = document.createElement('div');
          b.className = 'bubble ' + role;
          b.textContent = text;
          log.appendChild(b);
        }
        tagLastBubbleWithTs(role, ts || Date.now());
      }

      // (a) Rehydrate — wipe whatever the bundle may have restored from its
      // in-memory ring buffer, then pour the JSONL tail back in.
      function rehydrate() {
        fetch(base + '/api/notch/history?limit=60', { credentials: 'same-origin' })
          .then(function(r) { return r.ok ? r.json() : { items: [] }; })
          .then(function(data) {
            var items = (data && data.items) || [];
            if (!items.length) return;
            if (typeof window.__notchClearLog === 'function') window.__notchClearLog();
            items.forEach(function(rec) {
              var role = rec.role === 'agent' ? 'assistant' : 'user';
              addMsg(role, rec.text, rec.ts);
            });
          })
          .catch(function() { /* advisory */ });
      }

      // (b) Listen for message.out (user echo). The bundle's EventSource
      // handles message.in + voice.transcribed already; we only need to add
      // the one event it doesn't know about. We also intercept message.in /
      // voice.transcribed here just to attach timestamps to the bubbles the
      // bundle already appended.
      var es = null;
      function openSSE() {
        try {
          es = new EventSource(base + '/api/notch/stream');
        } catch (e) { return; }
        es.onmessage = function(ev) {
          var event;
          try { event = JSON.parse(ev.data); } catch (e) { return; }
          if (!event || !event.type) return;
          if (event.type === 'message.out') {
            var text = event.data && event.data.text;
            var from = event.data && event.data.from;
            // Skip when the message originates from this notch — the
            // bundled triggerSend has already pushed the user bubble
            // locally. Without this guard the user sees their input twice.
            if (text && from !== 'notch') addMsg('user', text, Date.now());
          } else if (event.type === 'message.in' || event.type === 'voice.transcribed') {
            // The bundle appended the bubble; we just stamp it.
            var role = event.type === 'message.in' ? 'assistant' : 'user';
            // defer one tick so the bundle wins the append race.
            setTimeout(function() { tagLastBubbleWithTs(role, Date.now()); }, 0);
          }
        };
        es.onerror = function() {
          try { es.close(); } catch (e) {}
          setTimeout(openSSE, 1500);
        };
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function() { rehydrate(); openSSE(); });
      } else {
        rehydrate();
        openSSE();
      }
    })();
  </script>
  <script>
    // Wave 2 — toolbar prefs + TTS audio playback.
    // Hooks three toggles (tts, hoverRecord, mute) to GET/POST /api/notch/prefs
    // so both surfaces stay in sync, and subscribes to `audio.play` SSE events
    // to auto-play TTS output. hoverRecord additionally notifies the native
    // tray app via messageHandlers.jarvis so the Swift side can arm/disarm
    // the StreamingRecorder — the dashboard mirror has no local mic, so the
    // pref is informational there.
    (function() {
      var host = window.__notchHost || window.location.origin;
      var base = host.replace(/\/+$/, '');
      var toolbar = document.getElementById('notch-toolbar');
      if (!toolbar) return;
      var inputs = toolbar.querySelectorAll('input[type="checkbox"][data-pref]');

      // Model-cycle button — opus → sonnet → haiku → opus. `null` falls back
      // to whatever agent.yaml says (currently opus). The label always shows
      // the EFFECTIVE model so the user knows what's about to be spawned.
      var MODEL_ORDER = [null, 'sonnet', 'haiku'];
      var modelBtn = document.getElementById('notch-model-cycle');
      var modelLabel = document.getElementById('model-label');
      function renderModel(value) {
        if (!modelLabel) return;
        modelLabel.textContent = value || 'opus';
      }
      if (modelBtn) {
        modelBtn.addEventListener('click', function () {
          var current = modelLabel ? (modelLabel.textContent || 'opus') : 'opus';
          var idx = MODEL_ORDER.indexOf(current === 'opus' ? null : current);
          if (idx < 0) idx = 0;
          var next = MODEL_ORDER[(idx + 1) % MODEL_ORDER.length];
          renderModel(next);
          postPatch({ model: next });
        });
      }

      function applyState(prefs) {
        inputs.forEach(function(el) {
          var k = el.getAttribute('data-pref');
          if (k in prefs) el.checked = !!prefs[k];
        });
        if ('model' in prefs) renderModel(prefs.model);
      }

      function loadPrefs() {
        fetch(base + '/api/notch/prefs', { credentials: 'same-origin' })
          .then(function(r) { return r.ok ? r.json() : null; })
          .then(function(prefs) { if (prefs) applyState(prefs); })
          .catch(function() { /* stay on defaults */ });
      }

      function postPatch(patch) {
        fetch(base + '/api/notch/prefs', {
          method: 'POST',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(patch)
        }).catch(function() { /* advisory */ });
      }

      function bridgeToNative(type, body) {
        try {
          if (window.webkit && window.webkit.messageHandlers &&
              window.webkit.messageHandlers.jarvis) {
            var msg = Object.assign({ type: type }, body || {});
            window.webkit.messageHandlers.jarvis.postMessage(msg);
          }
        } catch (e) { /* dashboard iframe has no bridge, ignore */ }
      }

      inputs.forEach(function(el) {
        el.addEventListener('change', function() {
          var k = el.getAttribute('data-pref');
          var patch = {};
          patch[k] = el.checked;
          postPatch(patch);
          if (k === 'hoverRecord') bridgeToNative('setHoverRecord', { on: el.checked });
        });
      });

      // TTS playback — one <audio> element reused across messages so rapid
      // replies queue naturally (new .src interrupts the previous one, which
      // matches the user's mental model: "Jarvis is saying the latest thing").
      var audioEl = null;
      function ensureAudio() {
        if (audioEl) return audioEl;
        audioEl = document.createElement('audio');
        audioEl.style.display = 'none';
        audioEl.preload = 'auto';
        document.body.appendChild(audioEl);
        return audioEl;
      }
      function playAudio(url) {
        var el = ensureAudio();
        try { el.pause(); } catch (e) {}
        el.src = base + url + '?t=' + Date.now();
        var p = el.play();
        if (p && typeof p.catch === 'function') p.catch(function() { /* autoplay denied */ });
      }

      // Fan out audio element lifecycle as window-level events so the
      // pending/playing inline script can clear the "parlando" indicator
      // exactly when playback ends — no relying on a server tts.stop event
      // that the router currently does not emit.
      function wireAudioLifecycle(el) {
        if (!el || el.__lifecycleWired) return;
        el.__lifecycleWired = true;
        function postPhase(phase) {
          try {
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.jarvis) {
              window.webkit.messageHandlers.jarvis.postMessage({ type: 'audioLifecycle', phase: phase });
            }
          } catch (_) {}
        }
        // 'play' and 'playing' both fire on resume — guard with a flag so
        // we send 'start' only once per playback session.
        ['play', 'playing'].forEach(function (evt) {
          el.addEventListener(evt, function () {
            if (!el.__lifecycleStarted) {
              el.__lifecycleStarted = true;
              postPhase('start');
            }
          });
        });
        ['ended', 'error', 'pause'].forEach(function (evt) {
          el.addEventListener(evt, function () {
            window.dispatchEvent(new CustomEvent('notch-audio-end', { detail: evt }));
            if (el.__lifecycleStarted) {
              el.__lifecycleStarted = false;
              postPhase('end');
            }
          });
        });
      }
      // Patch ensureAudio so the element is wired the moment it's created.
      var _origEnsure = ensureAudio;
      ensureAudio = function () {
        var el = _origEnsure();
        wireAudioLifecycle(el);
        return el;
      };

      // The same notch.html is loaded by BOTH the native JarvisNotch
      // WKWebView and the dashboard iframe mirror. If both subscribe to
      // `audio.play` and call el.play() we get two overlapping voices —
      // which is exactly what happened in the field. Rule: only the
      // native process plays audio; the dashboard mirror (query string
      // `?embed=dashboard`) stays silent so ambient speech comes from
      // one speaker only.
      var isDashboardMirror = /[?&]embed=dashboard\b/.test(window.location.search);
      var es = null;
      function openAudioSSE() {
        if (isDashboardMirror) return;
        try { es = new EventSource(base + '/api/notch/stream'); }
        catch (e) { return; }
        es.onmessage = function(ev) {
          var event;
          try { event = JSON.parse(ev.data); } catch (e) { return; }
          if (event && event.type === 'audio.play' && event.data && event.data.url) {
            playAudio(event.data.url);
          }
        };
        es.onerror = function() {
          try { es.close(); } catch (e) {}
          setTimeout(openAudioSSE, 1500);
        };
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function() { loadPrefs(); openAudioSSE(); });
      } else {
        loadPrefs();
        openAudioSSE();
      }
    })();
  </script>

  <!-- Pending / streaming / playing bubble feedback. The bundled notch.js
       only handles `message.in` (final text). This inline layer adds:
       - typing dots placeholder while agent is `thinking`
       - progressive text via `message.chunk` (router emits per-token)
       - "playing" glow + speaker glyph during TTS playback
       Lives outside the bundle so the manual edits in this file (toolbar,
       timestamps, etc.) survive without rebuilding the orb dist. -->
  <script>
    (function () {
      var log = document.getElementById('notch-log');
      if (!log) return;
      var pending = null;       // current pending/streaming bubble element
      var streamedAny = false;  // whether at least one chunk has landed
      var llmTimerEl = null;    // live LLM timer chip inside the bubble
      var llmTimerInterval = null;
      var llmTimerStartedAt = 0;
      var pendingTextEl = null; // inner span that holds the dots / streaming text

      function startLLMTimer(bubble) {
        if (llmTimerInterval) return; // already ticking
        llmTimerStartedAt = Date.now();
        if (!llmTimerEl || !llmTimerEl.isConnected) {
          llmTimerEl = document.createElement('span');
          llmTimerEl.className = 'live-timer';
          llmTimerEl.textContent = '0.0s';
          bubble.appendChild(llmTimerEl);
        }
        llmTimerInterval = setInterval(function () {
          if (!llmTimerEl) return;
          var s = (Date.now() - llmTimerStartedAt) / 1000;
          llmTimerEl.textContent = s.toFixed(1) + 's';
        }, 100);
      }

      function stopLLMTimer() {
        if (llmTimerInterval) clearInterval(llmTimerInterval);
        llmTimerInterval = null;
      }

      function ensurePending() {
        if (pending && pending.isConnected) return pending;
        var div = document.createElement('div');
        div.className = 'bubble assistant pending';
        // Inner container for dots/text so the live-timer chip can sit
        // alongside without being wiped on dots→text swap.
        var inner = document.createElement('span');
        inner.className = 'pending-text';
        for (var i = 0; i < 3; i++) {
          var d = document.createElement('span');
          d.className = 'typing-dot';
          inner.appendChild(d);
        }
        div.appendChild(inner);
        log.appendChild(div);
        log.scrollTop = log.scrollHeight;
        pending = div;
        pendingTextEl = inner;
        streamedAny = false;
        startLLMTimer(div);
        return div;
      }

      function appendChunk(text) {
        if (!text) return;
        var b = ensurePending();
        if (!streamedAny) {
          // First chunk → swap typing dots for real content (live timer
          // stays on, ticking until finalize).
          b.classList.remove('pending');
          b.classList.add('streaming');
          if (pendingTextEl) pendingTextEl.textContent = '';
          streamedAny = true;
        }
        if (pendingTextEl) pendingTextEl.textContent += text;
        log.scrollTop = log.scrollHeight;
      }

      // Strip the agent-appended footer `[t 10.8s | llm 10.7s | tok 22.1k>132 |
       // notch/claude-opus-4-7]` from the body of the bubble — the data lives
       // in the timing strip below instead, so the chat reads cleanly.
       // Also drops the `\n---` divider some agents prepend before the footer.
      function stripFooter(text) {
        if (!text) return '';
        return text
          .replace(/\n+\[t [^\]]+\][\s\S]*$/m, '')
          .replace(/\n+---+\n[\s\S]*$/, '')
          .trimEnd();
      }

      // Parse the agent footer to extract phase timings the agent already
      // measured server-side. Format: `[t 10.8s | llm 10.7s | tok 22.1k>132 | agent/model]`.
      function parseFooter(text) {
        if (!text) return null;
        var m = text.match(/\[t\s+([0-9.]+)s\s*[|=]\s*llm\s+([0-9.]+)s\s*[|=]\s*tok\s+([0-9.kKmM]+)>([0-9.kKmM]+)\s*[|=]\s*([^\]]+)\]/);
        if (!m) return null;
        var slashed = m[5].trim();
        var parts = slashed.split('/');
        // Shorten model: `claude-sonnet-4-5-20250929` → `sonnet`. Strip
        // version + date suffixes; keep only the family name.
        var shortModel = (parts[1] || '')
          .replace(/^claude-/, '')
          .replace(/-\d.*$/, '');
        return {
          t: parseFloat(m[1]),
          llm: parseFloat(m[2]),
          tokenIn: m[3],
          tokenOut: m[4],
          agent: parts[0] || '',
          model: shortModel,
        };
      }

      function makeStrip(role, segs) {
        // segs is an array of { label, value, cls? }.
        var strip = document.createElement('div');
        strip.className = 'timing-strip ' + role;
        segs.forEach(function (s) {
          if (!s || s.value == null || s.value === '') return;
          var seg = document.createElement('span');
          if (s.label) {
            var lab = document.createElement('span');
            lab.className = 'seg-label';
            lab.textContent = s.label;
            seg.appendChild(lab);
          }
          var val = document.createElement('span');
          val.className = 'seg-val' + (s.cls ? ' ' + s.cls : '');
          val.textContent = s.value;
          seg.appendChild(val);
          strip.appendChild(seg);
        });
        return strip;
      }

      function attachAssistantStrip(bubble, parsedFooter) {
        if (!bubble || !parsedFooter) return null;
        if (bubble.__timingStripAttached) return bubble.__timingStripAttached;
        var segs = [];
        // Merge the user-side transcription time into this same strip if
        // the most recent user bubble came from voice — keeps everything
        // on one line under the assistant bubble.
        if (window.__lastTrascrittoSec != null) {
          segs.push({ label: 'trascr', value: window.__lastTrascrittoSec.toFixed(1) + 's' });
          window.__lastTrascrittoSec = null;
        }
        segs.push({ label: 'llm', value: parsedFooter.llm.toFixed(1) + 's' });
        segs.push({ label: 'tok', value: parsedFooter.tokenIn + '→' + parsedFooter.tokenOut });
        segs.push({ value: parsedFooter.model, cls: 'seg-model' });
        var strip = makeStrip('assistant', segs);
        // Insert AFTER the bubble (and after any chat-ts the Fase 1 layer added).
        var after = bubble;
        if (after.nextElementSibling && after.nextElementSibling.classList.contains('chat-ts')) {
          after = after.nextElementSibling;
        }
        after.parentNode.insertBefore(strip, after.nextSibling);
        bubble.__timingStripAttached = strip;
        return strip;
      }

      // Live audio timer — chip lands inside the latest assistant bubble
      // (or the strip below it) the moment TTS playback starts and ticks
      // 10× per second until playback ends. After end the chip freezes
      // with the final duration and stays as a permanent record.
      var lastAudioStart = 0;
      var lastAssistantBubbleRef = null;
      var audioTimerEl = null;
      var audioTimerInterval = null;
      function startAudioLiveTimer(target) {
        if (audioTimerInterval) clearInterval(audioTimerInterval);
        audioTimerEl = document.createElement('span');
        audioTimerEl.className = 'live-timer audio';
        audioTimerEl.textContent = '0.0s';
        target.appendChild(audioTimerEl);
        audioTimerInterval = setInterval(function () {
          if (!audioTimerEl) return;
          var s = (Date.now() - lastAudioStart) / 1000;
          audioTimerEl.textContent = s.toFixed(1) + 's';
        }, 100);
      }
      function stopAudioLiveTimer() {
        if (audioTimerInterval) clearInterval(audioTimerInterval);
        audioTimerInterval = null;
      }
      function noteAudioStart() {
        lastAudioStart = Date.now();
        lastAssistantBubbleRef = pending || lastAssistantBubble();
        if (!lastAssistantBubbleRef) return;
        // Prefer the timing strip below the bubble; if not attached yet
        // (audio started before finalize), drop the chip into the bubble
        // itself so it's still visible.
        var host = lastAssistantBubbleRef.__timingStripAttached || lastAssistantBubbleRef;
        startAudioLiveTimer(host);
      }
      function noteAudioStop() {
        stopAudioLiveTimer();
        if (audioTimerEl) {
          // Freeze the chip in place — final duration is already in its
          // textContent thanks to the last interval tick.
          audioTimerEl.classList.add('frozen');
          audioTimerEl = null;
        }
        lastAudioStart = 0;
        lastAssistantBubbleRef = null;
      }

      function finalize(fullText) {
        var clean = stripFooter(fullText);
        var parsed = parseFooter(fullText);
        // Freeze the live LLM timer first so its final value matches
        // exactly what we put in the strip below (or can't drift).
        var liveSeconds = llmTimerInterval ? ((Date.now() - llmTimerStartedAt) / 1000) : null;
        stopLLMTimer();
        if (pending && !streamedAny && clean) {
          // No chunks arrived but we have the final text — replace dots
          // (and remove the live timer chip; the strip below holds it).
          pending.classList.remove('pending');
          pending.textContent = clean;
        } else if (pending && streamedAny && clean) {
          // Reconcile: server's final text wins over the streamed concat
          // and is also footer-stripped. Bubble loses the streaming
          // wrapper and goes back to a normal text bubble.
          pending.textContent = clean;
        }
        if (pending) {
          pending.classList.remove('streaming');
          // Prefer the agent's measured `llm` value (server-side, more
          // accurate). Fall back to our wall-clock if the footer didn't
          // include timings.
          var stripParsed = parsed || (liveSeconds != null
            ? { llm: liveSeconds, tokenIn: '', tokenOut: '', model: '' }
            : null);
          if (stripParsed) attachAssistantStrip(pending, stripParsed);
        }
        llmTimerEl = null;
        pendingTextEl = null;
        pending = null;
        streamedAny = false;
      }

      function lastAssistantBubble() {
        var bubbles = log.querySelectorAll('.bubble.assistant');
        return bubbles.length ? bubbles[bubbles.length - 1] : null;
      }

      // Insert a 3-bar VU indicator JUST ABOVE the target assistant bubble
      // (or above the pending one while we're still waiting for text). The
      // indicator is a sibling, not a class on the bubble — easier to spot
      // and doesn't fight with the bubble's own border / padding.
      function setPlaying(on) {
        // Always remove any stale indicators first.
        log.querySelectorAll('.audio-indicator').forEach(function (n) { n.remove(); });
        if (!on) return;
        var target = pending || lastAssistantBubble();
        if (!target) return;
        var ind = document.createElement('div');
        ind.className = 'audio-indicator';
        for (var i = 0; i < 3; i++) {
          var b = document.createElement('span');
          b.className = 'audio-bar';
          ind.appendChild(b);
        }
        var label = document.createElement('span');
        label.className = 'audio-label';
        label.textContent = 'parlando';
        ind.appendChild(label);
        target.parentNode.insertBefore(ind, target);
        log.scrollTop = log.scrollHeight;
      }

      // Install the __notchPush hook AFTER the bundled module has booted.
      // The bundle is loaded as <script type="module"> (deferred), so it
      // assigns `window.__notchPush = pushBubble` only after this inline
      // script runs. If we hooked synchronously here, the bundle would
      // overwrite our function → finalize never fires → pending bubble
      // sticks around when the assistant reply lands. Polling for a few
      // hundred ms covers the boot window without a race.
      var hookInstalled = false;
      function installPushHook() {
        if (hookInstalled) return;
        if (typeof window.__notchPush !== 'function') return;
        hookInstalled = true;
        var origPush = window.__notchPush;
        window.__notchPush = function (role, text) {
          if (role === 'assistant' && pending) {
            finalize(text);
            return; // pending bubble in DOM — don't double-push
          }
          return origPush(role, text);
        };
        console.log('[pending] __notchPush hook installed');
      }
      // Try right away in case the bundle is already up, then poll.
      installPushHook();
      var hookTries = 0;
      var hookTimer = setInterval(function () {
        installPushHook();
        if (hookInstalled || ++hookTries > 60) clearInterval(hookTimer);
      }, 50);

      // Listen to agent-state to spawn pending on thinking.
      window.addEventListener('agent-state', function (e) {
        var s = e.detail || 'idle';
        console.log('[pending] agent-state=', s);
        if (s === 'thinking') {
          ensurePending();
          console.log('[pending] ensure done, log children=', log.children.length);
        } else if (s === 'idle') {
          // Idle reaches us in three scenarios:
          //   1. Normal completion — finalize() already ran via the
          //      __notchPush hook, `pending` is null. Nothing to do.
          //   2. Bundle-handled completion — the bundle's `message.in`
          //      handler ran origPush BEFORE our hook took over. The
          //      pending bubble is detached but our pointer lingers.
          //   3. Abort / error — the router emits idle with no `message.in`
          //      ever following. The pending bubble is still in the DOM
          //      with a ticking live-timer. THIS is the leak we have to fix.
          stopLLMTimer();
          if (pending) {
            if (!pending.isConnected) {
              // Scenario 2 — already gone, just drop the pointer.
            } else if (!streamedAny) {
              // Scenario 3a — placeholder with only typing dots. Remove
              // it entirely; an aborted turn shouldn't leave an empty
              // bubble + ticking counter behind.
              try { pending.remove(); } catch (_) {}
            } else {
              // Scenario 3b — we received some chunks but never a final.
              // Keep the streamed content as the assistant's reply but
              // strip the loading affordances (streaming wrapper, live
              // timer chip) so it reads as a finished message.
              pending.classList.remove('streaming', 'pending');
              if (llmTimerEl) { try { llmTimerEl.remove(); } catch (_) {} }
            }
          }
          llmTimerEl = null;
          pendingTextEl = null;
          pending = null;
          streamedAny = false;
        }
      });

      // Own SSE for chunk + tts events the bundle ignores.
      function open() {
        var host = (window.__notchHost || window.location.origin).replace(/\/+$/, '');
        var es = new EventSource(host + '/api/notch/stream');
        var backoff = 500;
        es.onopen = function () { backoff = 500; };
        es.onerror = function () {
          try { es.close(); } catch (_) {}
          setTimeout(open, backoff);
          backoff = Math.min(backoff * 1.6, 10000);
        };
        es.onmessage = function (m) {
          try {
            var ev = JSON.parse(m.data);
            if (!ev || !ev.type) return;
            if (ev.type === 'message.chunk') {
              appendChunk((ev.data && ev.data.text) || '');
            } else if (ev.type === 'tts.speak') {
              setPlaying(true);
            } else if (ev.type === 'tts.stop') {
              setPlaying(false);
            } else if (ev.type === 'audio.play') {
              // The dashboard mirror also uses audio.play to fire playback;
              // mark playing for a max of 30s as a safety auto-clear in case
              // tts.stop never fires.
              setPlaying(true);
              noteAudioStart();
              clearTimeout(window.__notchPlayingTimer);
              window.__notchPlayingTimer = setTimeout(function () {
                setPlaying(false);
                noteAudioStop();
              }, 30000);
            }
            if (ev.type === 'tts.stop') {
              noteAudioStop();
            }
          } catch (_) {}
        };
      }

      // Real audio-end signal from the <audio> element. Clears the indicator
      // immediately (instead of waiting for the 30 s safety timeout) and
      // appends the actual playback duration to the timing strip.
      window.addEventListener('notch-audio-end', function () {
        clearTimeout(window.__notchPlayingTimer);
        setPlaying(false);
        noteAudioStop();
      });
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', open);
      } else {
        open();
      }

      // ── Voice mode UI ──────────────────────────────────────────────────
      // Driven by Swift via window.__notchVoice* callbacks. State machine:
      //   Live → partials grow in italic → final → bubble normal (sent)
      //   Grace → orange aura fades over Xms → if not cancelled, recorder stops
      var liveBubble = null;
      var graceAuraEl = null;
      var voiceBadge = null;
      var voiceBars = [];
      function ensureVoiceBadge() {
        if (voiceBadge && voiceBadge.isConnected) return voiceBadge;
        var b = document.createElement('div');
        b.className = 'voice-mode-badge';
        var label = document.createElement('span');
        label.textContent = 'ascolto';
        b.appendChild(label);
        var vu = document.createElement('span');
        vu.className = 'vu';
        for (var i = 0; i < 5; i++) {
          var bar = document.createElement('i');
          bar.style.height = '4px';
          bar.style.transform = 'scaleY(0.3)';
          vu.appendChild(bar);
          voiceBars.push(bar);
        }
        b.appendChild(vu);
        log.parentNode.insertBefore(b, log.nextSibling);
        voiceBadge = b;
        return b;
      }
      function tearDownVoiceBadge() {
        if (voiceBadge) { try { voiceBadge.remove(); } catch (_) {} }
        voiceBadge = null;
        voiceBars = [];
      }
      window.__notchPartialLevel = function (level) {
        var lev = Math.max(0, Math.min(1, level || 0));
        // Drive the input-row fill effect — the user wanted the whole input
        // to fill up while they speak as a "I hear you" feedback.
        document.documentElement.style.setProperty('--voice-level', lev.toFixed(3));
        // VU bars (existing)
        if (voiceBars.length) {
          for (var i = 0; i < voiceBars.length; i++) {
            var phase = (i + 1) / voiceBars.length;
            var height = 0.2 + lev * (0.6 + 0.4 * Math.sin((Date.now() / 80) + i));
            voiceBars[i].style.transform = 'scaleY(' + Math.min(1, height * (1.4 - phase * 0.4)) + ')';
          }
        }
      };
      // Tracks whether the mic is actually open. The VAD callbacks (voiced /
      // silent) can race with LiveEnd — a final voiced/silent emit landing
      // after we've torn down voice mode would otherwise stick the green
      // class on body forever, leaving the input ring permanently green.
      // Gating both callbacks behind this flag eliminates the ghost state.
      var voiceMode = false;
      window.__notchVoiceLiveStart = function () {
        voiceMode = true;
        ensureVoiceBadge();
        voiceStartAt = Date.now();
        if (liveBubble) { try { liveBubble.remove(); } catch (_) {} liveBubble = null; }
        // Mic open, no voice yet → cyan "ascolto" aura on body.
        document.body.classList.add('voice-listening');
        document.body.classList.remove('voice-voiced');
      };
      window.__notchVoiceVoiced = function () {
        if (!voiceMode) return;
        document.body.classList.add('voice-voiced');
        document.body.classList.remove('voice-listening');
      };
      window.__notchVoiceSilent = function () {
        if (!voiceMode) return;
        document.body.classList.remove('voice-voiced');
        document.body.classList.add('voice-listening');
      };
      // Live partials/final go INTO the chat input box (next to the mic)
      // so what the user is saying is shown in the same place a typed
      // message would appear, instead of as a separate "live transcript"
      // bubble. Swift still auto-POSTs the final via postTranscriptAsMessage
      // → the canonical user bubble lands via SSE message.out.
      var inputEl = document.getElementById('notch-input');
      function setInputFromVoice(text) {
        if (!inputEl) return;
        inputEl.value = text || '';
        // Fire `input` so the bundle's listener updates the send button
        // enabled state and notifies the tray of inputChange.
        inputEl.dispatchEvent(new Event('input', { bubbles: true }));
      }
      window.__notchVoicePartial = function (text) {
        if (!text) return;
        setInputFromVoice(text);
      };
      window.__notchVoiceFinal = function (_text) {
        // No-op for the input. Apple's SFSpeechRecognizer emits the final
        // result asynchronously AFTER request.endAudio() — that arrives
        // after Swift has already shipped the transcript and we've cleared
        // the input on LiveEnd. Writing the final back into the input here
        // would re-populate the field with the just-sent message, leaving
        // it visible until the next utterance overwrites it.
      };
      window.__notchVoiceLiveEnd = function () {
        voiceMode = false;
        setInputFromVoice('');
        tearDownVoiceBadge();
        document.body.classList.remove('voice-listening', 'voice-voiced');
        document.documentElement.style.setProperty('--voice-level', '0');
      };
      window.__notchVoiceGraceStart = function (ms) {
        if (graceAuraEl) { try { graceAuraEl.remove(); } catch (_) {} }
        var el = document.createElement('div');
        el.className = 'grace-aura';
        el.style.setProperty('--grace-ms', (ms || 2500) + 'ms');
        document.body.appendChild(el);
        graceAuraEl = el;
      };
      window.__notchVoiceGraceCancel = function () {
        if (graceAuraEl) { try { graceAuraEl.remove(); } catch (_) {} }
        graceAuraEl = null;
      };
      window.__notchVoiceGraceEnd = function () {
        if (graceAuraEl) { try { graceAuraEl.remove(); } catch (_) {} }
        graceAuraEl = null;
      };

      // Hot-corner abort warning — Swift toggles this on while the cursor
      // is within 200px of a screen corner during voice mode. A flashy red
      // ring tells the user "go further to cancel". On true → paint, on
      // false → remove. The actual abort is fired Swift-side at <80px.
      var abortWarnEl = null;
      window.__notchVoiceAbortWarn = function (on) {
        if (on) {
          if (abortWarnEl) return;
          abortWarnEl = document.createElement('div');
          abortWarnEl.className = 'abort-warn';
          document.body.appendChild(abortWarnEl);
        } else {
          if (abortWarnEl) { try { abortWarnEl.remove(); } catch (_) {} }
          abortWarnEl = null;
        }
      };

      // Track only voice-transcription duration. Typing time was noise —
      // the user only cares how long Apple's STT took. `voiceStartAt` is
      // set on `__notchVoiceLiveStart` and consumed when the next user
      // bubble lands; if the bubble came from typed input, no strip.
      var voiceStartAt = 0;
      function attachUserBubbleObserver() {
        var mo = new MutationObserver(function (mutations) {
          mutations.forEach(function (m) {
            m.addedNodes.forEach(function (n) {
              if (!(n instanceof HTMLElement)) return;
              if (!n.classList.contains('bubble') || !n.classList.contains('user')) return;
              if (n.__timingHandled) return;
              n.__timingHandled = true;
              if (!voiceStartAt) return;
              var dur = (Date.now() - voiceStartAt) / 1000;
              voiceStartAt = 0;
              if (dur > 0.05) {
                // Stash for the next assistant strip — we render trascr
                // and llm on the SAME line under the assistant bubble.
                window.__lastTrascrittoSec = dur;
              }
            });
          });
        });
        mo.observe(log, { childList: true });
      }
      function attachInputObserver() { /* removed: typing time was noise */ }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function () {
          attachInputObserver();
          attachUserBubbleObserver();
        });
      } else {
        attachInputObserver();
        attachUserBubbleObserver();
      }
    })();
  </script>
</body>
</html>
