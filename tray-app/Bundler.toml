format_version = 2

# JarvisTray-only bundler config.
#
# JarvisNotch.app is built from a separate repo (~/agent-notch) by
# ./redeploy-notch.sh and ./make-app.sh — not by swift-bundler from
# this Package.swift. See those scripts for the notch packaging
# (Info.plist keys, entitlements, codesign flags).

# ── Menubar app ────────────────────────────────────────────────────────
[apps.JarvisTray]
identifier = "io.armonia.jarvis.tray"
product    = "JarvisTray"
version    = "0.1.0"
category   = "public.app-category.productivity"

[apps.JarvisTray.plist]
LSUIElement             = true
LSMinimumSystemVersion  = "14.0"
CFBundleName            = "Jarvis"
CFBundleDisplayName     = "Jarvis"
NSHumanReadableCopyright = "Copyright © 2026 Attilio Cianci."
